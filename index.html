<body>
<div id="toast-physics" class="toast-physics"></div>
<canvas id="particles-canvas"></canvas>
<div class="app-container" id="appContainer"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC9PoPonmPIZ4GMBqyaaTBNwVbvU1VgzG4",
        authDomain: "physics-plan-7sn.firebaseapp.com",
        projectId: "physics-plan-7sn",
        storageBucket: "physics-plan-7sn.firebasestorage.app",
        messagingSenderId: "359086470544",
        appId: "1:359086470544:web:081934928ebf002bcf6f15"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let isTeacherMode = false;
    let allPlans = {}; // { planId: { name, color, calculationMethod, days, ... } }
    let currentPlanId = null;
    let currentPlan = null;
    let currentSchedule = [];
    let allSubTasks = [];
    let currentStudent = null;
    let allStudents = [];
    let adminAuthenticated = false;

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    function extractDuration(text) { let match = text.match(/\{(\d+(?:\.\d+)?)\}/); return match ? parseFloat(match[1]) : null; }
    function cleanTaskText(rawText) { return rawText.replace(/\s*\{[\d\.]+\}\s*$/, '').trim(); }
    function splitSub(text) {
        if (!text) return [];
        const lines = text.split(/\n/);
        const tasks = [];
        for (let line of lines) {
            line = line.trim();
            if (line === '') continue;
            if (line.includes('/')) {
                const parts = line.split(/\s*\/\s*/);
                for (let part of parts) if (part.trim()) tasks.push(part.trim());
            } else {
                tasks.push(line);
            }
        }
        return tasks;
    }

    function getTotalHoursOfPlan() {
        return allSubTasks.reduce((sum, task) => sum + (task.duration || 0), 0);
    }
    function getCompletedHoursForStudent(student) {
        const completedEntries = getStudentCompletedBySubject(student, currentPlanId);
        let total = 0;
        completedEntries.forEach(entry => {
            const task = allSubTasks.find(t => t.id === entry.taskId);
            if (task && task.duration) total += task.duration;
        });
        return total;
    }

    function rebuildSubtaskIds() {
        allSubTasks = [];
        let idCounter = 0;
        if (!currentSchedule) return;
        currentSchedule.forEach((day, dayIdx) => {
            let morningTasks = splitSub(day.morning);
            morningTasks.forEach(taskText => {
                let duration = 0;
                if (currentPlan && currentPlan.calculationMethod === 'hours') {
                    duration = extractDuration(taskText) || 0;
                } else {
                    duration = 1;
                }
                allSubTasks.push({ id: `task_${idCounter++}`, dayIndex: dayIdx, period: 'الصباحية', text: taskText, duration: duration });
            });
            let eveningTasks = splitSub(day.evening);
            eveningTasks.forEach(taskText => {
                let duration = 0;
                if (currentPlan && currentPlan.calculationMethod === 'hours') {
                    duration = extractDuration(taskText) || 0;
                } else {
                    duration = 1;
                }
                allSubTasks.push({ id: `task_${idCounter++}`, dayIndex: dayIdx, period: 'المسائية', text: taskText, duration: duration });
            });
        });
    }

    // ---------- Firebase Helpers ----------
    async function safeFirebaseGet(docRef, timeoutMs = 5000) {
        const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('انتهت المهلة')), timeoutMs));
        const getPromise = docRef.get();
        return await Promise.race([getPromise, timeoutPromise]);
    }

    async function loadAllPlans() {
        try {
            const snapshot = await db.collection('plans').get();
            allPlans = {};
            snapshot.forEach(doc => {
                allPlans[doc.id] = doc.data();
            });
            // إذا كانت المجموعة فارغة، نقوم بترحيل الخطط القديمة
            if (Object.keys(allPlans).length === 0) {
                await migrateOldPlans();
            }
        } catch (e) {
            console.warn("Error loading plans, trying migration", e);
            await migrateOldPlans();
        }
    }

    async function migrateOldPlans() {
        // فيزياء
        try {
            const physDoc = await db.collection('config').doc('schedule_physics').get();
            if (physDoc.exists) {
                const data = physDoc.data().days;
                await db.collection('plans').doc('physics').set({
                    name: 'الفيزياء',
                    color: '#2c6e3c',
                    calculationMethod: 'tasks',
                    days: data,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        } catch(e) { console.warn("Migrate physics error", e); }

        // علوم
        try {
            const sciDoc = await db.collection('config').doc('schedule_science').get();
            if (sciDoc.exists) {
                const data = sciDoc.documents ? sciDoc.data().days : sciDoc.data().days;
                await db.collection('plans').doc('science').set({
                    name: 'العلوم',
                    color: '#b85c1a',
                    calculationMethod: 'hours',
                    days: data,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        } catch(e) { console.warn("Migrate science error", e); }

        // إعادة تحميل الخطط
        const snapshot = await db.collection('plans').get();
        allPlans = {};
        snapshot.forEach(doc => { allPlans[doc.id] = doc.data(); });
    }

    async function loadPlan(planId) {
        if (!allPlans[planId]) {
            showToast('الخطة غير موجودة', true);
            return;
        }
        currentPlanId = planId;
        currentPlan = allPlans[planId];
        currentSchedule = currentPlan.days || [];
        rebuildSubtaskIds();

        if (isTeacherMode) {
            await loadAllStudents();
            renderTeacherView();
        } else {
            renderStudentView();
        }
        // تحديث الكاروسيل/الشبكة لتعكس الحالة النشطة
        renderPlanSelectors();
    }

    // ---------- Student Functions ----------
    async function registerStudent(fullName, gender) {
        const newId = db.collection('students').doc().id;
        const studentData = { fullName, gender, completedTasksPhysics: [], completedTasksScience: [], createdAt: firebase.firestore.FieldValue.serverTimestamp(), lastUpdated: firebase.firestore.FieldValue.serverTimestamp() };
        await db.collection('students').doc(newId).set(studentData);
        currentStudent = { id: newId, ...studentData };
        safeLocalStorageSet('studentId', newId);
        return currentStudent;
    }
    function safeLocalStorageSet(key, value) { try { localStorage.setItem(key, value); return true; } catch(e) { return false; } }
    function safeLocalStorageGet(key) { try { return localStorage.getItem(key); } catch(e) { return null; } }

    async function loadStudentData(studentId) {
        const doc = await db.collection('students').doc(studentId).get();
        if (doc.exists) {
            currentStudent = { id: studentId, ...doc.data() };
            if (!currentStudent.completedTasksPhysics) currentStudent.completedTasksPhysics = [];
            if (!currentStudent.completedTasksScience) currentStudent.completedTasksScience = [];
        } else currentStudent = null;
    }

    async function saveStudentProgress(studentId, completedArray, planId) {
        const updateField = planId === 'physics' ? 'completedTasksPhysics' : 'completedTasksScience';
        await db.collection('students').doc(studentId).update({ [updateField]: completedArray, lastUpdated: firebase.firestore.FieldValue.serverTimestamp() });
    }

    function getStudentCompletedBySubject(student, planId) {
        if (planId === 'physics') return student.completedTasksPhysics || [];
        if (planId === 'science') return student.completedTasksScience || [];
        // للخطط الجديدة، نخزنها تحت مفتاح عام أو حسب المعرف
        // سنخزن في حقل completedTasksOthers كائن يحتوي على planId كمفتاح
        if (!student.completedTasksOthers) student.completedTasksOthers = {};
        return student.completedTasksOthers[planId] || [];
    }

    async function saveStudentProgressGeneric(studentId, completedArray, planId) {
        if (planId === 'physics') {
            await db.collection('students').doc(studentId).update({ completedTasksPhysics: completedArray });
        } else if (planId === 'science') {
            await db.collection('students').doc(studentId).update({ completedTasksScience: completedArray });
        } else {
            // خطط جديدة
            const doc = await db.collection('students').doc(studentId).get();
            let data = doc.data();
            if (!data.completedTasksOthers) data.completedTasksOthers = {};
            data.completedTasksOthers[planId] = completedArray;
            await db.collection('students').doc(studentId).update({ completedTasksOthers: data.completedTasksOthers });
        }
    }

    async function handleTaskToggle(e) {
        const cb = e.target;

        if (!currentStudent || !currentPlan) return;
        let completed = getStudentCompletedBySubject(currentStudent, currentPlanId);
        if (cb.checked) { playSound('complete'); completed.push({ taskId, completedAt: Date.now() }); }
        else { completed = completed.filter(entry => entry.taskId !== taskId); }
        
        // حفظ في Firebase حسب الخطة
        await saveStudentProgressGeneric(currentStudent.id, completed, currentPlanId);
        // تحديث الكائن المحلي

            if (!currentStudent.completedTasksOthers) currentStudent.completedTasksOthers = {};

        }

        playBeep();

    async function showStudentTasks(studentId) {
        const student = allStudents.find(s => s.id === studentId);
        if (!student) return;
        const completedEntries = getStudentCompletedBySubject(student, currentPlanId);
        const completedTasksList = [];
        for (const entry of completedEntries) {
            const task = allSubTasks.find(t => t.id === entry.taskId);
            if (!task) continue;
            const day = currentSchedule[task.dayIndex];
            const dateStr = currentPlanId === 'physics' ? (day ? day.date : '?') : (day ? `اليوم ${day.dayNumber}` : '?');
            completedTasksList.push({ text: task.text, completedAt: entry.completedAt, date: dateStr, duration: task.duration });
        }

        const totalHours = getTotalHoursOfPlan();
        const completedHours = getCompletedHoursForStudent(student);
        const percent = totalHours === 0 ? 0 : ((completedHours / totalHours) * 100).toFixed(1);
        const taskPercent = allSubTasks.length === 0 ? 0 : ((completedTasksList.length / allSubTasks.length) * 100).toFixed(1);

        const titleEl = document.getElementById('studentTasksTitle');
        if (titleEl) {
            titleEl.innerHTML = `
                <div style="text-align:center;">
                    <div style="font-size:1.2rem; margin-bottom:8px;"><i class="fas fa-user-graduate"></i> ${escapeHtml(student.fullName)}</div>
                    <div style="display:flex; justify-content:center; gap:20px; flex-wrap:wrap; font-size:0.9rem;">
                        <span style="background:#e8f5e9; padding:4px 12px; border-radius:20px;"><i class="fas fa-tasks"></i> المهام: ${completedTasksList.length}/${allSubTasks.length} (${taskPercent}%)</span>
                        <span style="background:#e3f2fd; padding:4px 12px; border-radius:20px;"><i class="fas fa-clock"></i> الساعات: ${completedHours.toFixed(1)}/${totalHours.toFixed(1)} (${percent}%)</span>
                    </div>
                </div>
            `;
        }
        const container = document.getElementById('studentTasksList');
        if (container) {
            if (completedTasksList.length === 0) {
                container.innerHTML = '<div class="student-task-card">لا توجد مهام مكتملة</div>';
            } else {
                container.innerHTML = completedTasksList.map(task => {
                    const timeDateStr = formatTimeAndDate(task.completedAt);
                    let durationHtml = (currentPlan?.calculationMethod === 'hours' && task.duration) ? `<span class="duration-badge" style="background:#2196f3;"><i class="fas fa-clock"></i> ${task.duration} ساعة</span>` : '';
                    return `<div class="student-task-card"><i class="fas fa-check-circle student-task-icon"></i><div style="flex:1;"><div style="font-weight:bold;">${escapeHtml(cleanTaskText(task.text))}</div><div style="font-size:0.75rem; color:#4a6741;">🕒 ${timeDateStr}</div></div>${durationHtml}</div>`;
                }).join('');
            }
        }
        const modal = document.getElementById('studentTasksModal');
        if (modal) {
            modal.style.visibility = 'visible';
            modal.style.opacity = '1';
            modal.classList.add('active');
            modal.style.zIndex = '3001';
        }
        playSound('select');
    }

    async function handleDelete(e) { const btn=e.currentTarget; const dayIdx=parseInt(btn.dataset.day); const period=btn.dataset.period; const idx=parseInt(btn.dataset.idx); const container = period==='morning'?document.getElementById(`mornEditList-${dayIdx}`):document.getElementById(`evenEditList-${dayIdx}`); const items=Array.from(container.children); if(idx<items.length) items[idx].remove(); reindexEditItems(dayIdx); }

    async function saveScheduleChanges() {
        const newDays = [];

            const morningTextareas = document.querySelectorAll(`#mornEditList-${i} textarea`);
            const eveningTextareas = document.querySelectorAll(`#evenEditList-${i} textarea`);

            const oldDay = currentSchedule[i];
            newDays.push({ 
                dayNumber: oldDay.dayNumber || i+1, 
                weekday: oldDay.weekday || `اليوم ${i+1}`, 
                morning: morningTexts.join('\n'), 
                evening: eveningTexts.join('\n') 
            });
        }
        // تحديث الخطة في Firebase
        await db.collection('plans').doc(currentPlanId).update({ days: newDays });
        // تحديث الكائن المحلي
        allPlans[currentPlanId].days = newDays;
        currentSchedule = newDays;
        rebuildSubtaskIds();

        if (isTeacherMode) await renderTeacherView();
        else renderStudentView();
        document.getElementById('editScheduleModal').classList.remove('active');

    // ---------- Utilities ----------
    function formatTimeAndDate(timestampMs) {
        if (!timestampMs) return '—';
        const date = new Date(timestampMs);
        let hours = date.getHours();
        const minutes = date.getMinutes().toString().padStart(2, '0');
        const ampm = hours >= 12 ? 'م' : 'ص';
        hours = hours % 12; if (hours === 0) hours = 12;
        return `${hours}:${minutes} ${ampm} - ${date.getDate()}/${date.getMonth()+1}`;
    }

    function showCustomModal(message) { 
        const modal = document.getElementById('customMessageModal'); 
        document.getElementById('customMessageText').innerText = message; 
        modal.classList.add('active'); 
        setTimeout(() => modal.classList.remove('active'), 2000); 
    }

    function showToast(message, isError=false) { 
        const toast = document.getElementById('toast-physics'); 
        if (!toast) return; 
        toast.textContent = message; 
        toast.classList.remove('show','error'); 
        if (isError) toast.classList.add('error'); 
        void toast.offsetWidth; 
        toast.classList.add('show'); 
        clearTimeout(toast._timeout); 
        toast._timeout = setTimeout(() => { toast.classList.remove('show'); }, 2400); 
    }

    function playSound(type) { try { if(!initAudio()) return; let freq=800,dur=0.12,vol=0.1; if(type==='click'){freq=880;dur=0.08;vol=0.08;}else if(type==='select'){freq=660;dur=0.2;vol=0.12;}else if(type==='complete'){freq=1200;dur=0.15;vol=0.1;}else if(type==='success'){ const osc2=audioContext.createOscillator(); const gain2=audioContext.createGain(); osc2.connect(gain2); gain2.connect(audioContext.destination); osc2.frequency.value=1100; gain2.gain.value=vol; osc2.type='sine'; osc2.start(); gain2.gain.exponentialRampToValueAtTime(0.0001,audioContext.currentTime+dur); osc2.stop(audioContext.currentTime+dur); return; } const osc=audioContext.createOscillator(); const gain=audioContext.createGain(); osc.connect(gain); gain.connect(audioContext.destination); osc.frequency.value=freq; gain.gain.value=vol; osc.type='sine'; osc.start(); gain.gain.exponentialRampToValueAtTime(0.0001,audioContext.currentTime+dur); osc.stop(audioContext.currentTime+dur); } catch(e){} }
    function playBeep() { try { if(!audioContext){ try{ audioContext=new (AudioContext||webkitAudioContext)(); }catch(e){return;} } const osc=audioContext.createOscillator(); const gain=audioContext.createGain(); osc.connect(gain); gain.connect(audioContext.destination); osc.frequency.value=880; gain.gain.value=0.15; osc.type='sine'; osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001,audioContext.currentTime+0.3); osc.stop(audioContext.currentTime+0.3); if(audioContext.state==='suspended') audioContext.resume(); } catch(e){} }

    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function createParticles() { particles = []; for(let i=0;i<70;i++) particles.push({ x:Math.random()*canvas.width, y:Math.random()*canvas.height, radius:Math.random()*4+2, speedX:(Math.random()-0.5)*0.5, speedY:(Math.random()-0.5)*0.3, color:`rgba(60,120,70,${Math.random()*0.3+0.1})` }); }
    function drawParticles() { ctx.clearRect(0,0,canvas.width,canvas.height); for(let p of particles){ ctx.beginPath(); ctx.arc(p.x,p.y,p.radius,0,Math.PI*2); ctx.fillStyle=p.color; ctx.fill(); p.x+=p.speedX; p.y+=p.speedY; if(p.x<0) p.x=canvas.width; if(p.x>canvas.width) p.x=0; if(p.y<0) p.y=canvas.height; if(p.y>canvas.height) p.y=0; } requestAnimationFrame(drawParticles); }
    resizeCanvas(); createParticles(); drawParticles(); window.addEventListener('resize',()=>{ resizeCanvas(); createParticles(); });

    // ---------- Modals ----------
    function addModals() {
        const modalHTML = `
            <div id="taskStatsModal" class="modal"><div class="modal-content"><h3 id="taskStatTitle" style="color:#1f5437;"></h3><div class="filter-buttons"><button id="filterAllModal" class="filter-btn active">الكل</button><button id="filterMaleModal" class="filter-btn">🧑 ذكور</button><button id="filterFemaleModal" class="filter-btn">👩 إناث</button></div><div id="studentsCompletedListModal"></div><button class="btn" id="closeStatsModal" style="margin-top:15px;">إغلاق</button></div></div>
            <div id="studentTasksModal" class="modal"><div class="modal-content"><h3 id="studentTasksTitle" style="color:#1f5437;"></h3><div id="studentTasksList" style="margin:15px 0;"></div><button class="btn" id="closeStudentTasksModal">إغلاق</button></div></div>
            <div id="allStudentsModal" class="modal"><div class="modal-content"><h3 style="color:#1f5437;">👨‍🎓 قائمة الطلاب</h3><div class="filter-buttons"><button id="filterAll" class="filter-btn active">الكل</button><button id="filterMale" class="filter-btn">🧑 ذكور</button><button id="filterFemale" class="filter-btn">👩 إناث</button></div><div id="allStudentsList"></div><button class="btn" id="closeAllStudentsModal" style="margin-top:15px;">إغلاق</button></div></div>
            <div id="editScheduleModal" class="modal"><div class="modal-content" style="max-width:900px;"><h3 style="color:#1f5437;">✏️ تعديل الخطة: <span id="editPlanName"></span></h3><div id="editScheduleFields"></div></div></div>
            <div id="customMessageModal" class="modal"><div class="modal-content" style="text-align:center; max-width:350px;"><i class="fas fa-check-circle" style="font-size:3rem; color:#2c6e3c;"></i><p id="customMessageText" style="margin-top:10px;"></p></div></div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHTML);
        document.getElementById('closeStatsModal')?.addEventListener('click', () => document.getElementById('taskStatsModal').classList.remove('active'));
        document.getElementById('closeStudentTasksModal')?.addEventListener('click', () => document.getElementById('studentTasksModal').classList.remove('active'));
        document.getElementById('closeAllStudentsModal')?.addEventListener('click', () => document.getElementById('allStudentsModal').classList.remove('active'));
        // Close modals on background click
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.classList.remove('active');
                    modal.style.visibility = 'hidden';
                    modal.style.opacity = '0';
                }
            });
        });
    }
    addModals();

    // ---------- Init App ----------
    async function initApp() {
        document.getElementById('appContainer').innerHTML = `
            <div style="text-align:center; padding:3rem; background:#fff; border-radius:2rem; margin:2rem; box-shadow:0 10px 25px rgba(0,0,0,0.05);">
                <i class="fas fa-spinner fa-pulse" style="font-size:3rem; color:#2c6e3c;"></i>
                <p style="margin-top:1rem; font-weight:bold; color:#1f5437;">جاري تحميل الخطط...</p>
            </div>
        `;

        try {
            await loadAllPlans();
        } catch(e) {
            console.error("Error loading plans", e);
            document.getElementById('appContainer').innerHTML = `
                <div style="text-align:center; padding:2rem; background:white; border-radius:2rem; margin:2rem; border-right:5px solid #c0392b;">
                    <i class="fas fa-exclamation-triangle" style="font-size:4rem; color:#c0392b;"></i>
                    <h2 style="color:#c0392b;">فشل تحميل البيانات</h2>
                    <p>يرجى التحقق من اتصالك بالإنترنت أو تحديث الصفحة.</p>
                    <button onclick="location.reload()" class="btn" style="margin-top:1rem;">إعادة المحاولة</button>
                </div>
            `;
            return;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const isTeacherRequest = urlParams.get('teacher') === 'true';

        if (isTeacherRequest) {
            isTeacherMode = true;
            adminAuthenticated = true;
            // اختيار أول خطة افتراضية إن لم تكن محددة
            const planIds = Object.keys(allPlans);
            if (planIds.length > 0 && !currentPlanId) {
                await loadPlan(planIds[0]);
            } else if (planIds.length === 0) {
                // لا توجد خطط، نعرض رسالة
                document.getElementById('appContainer').innerHTML = `
                    <div class="hero-area"><div class="logo-title"><h1>📚 لوحة المشرف</h1></div><div class="admin-buttons"><button id="addPlanBtnTeacher" class="btn-icon" style="background:#4caf50; color:white;"><i class="fas fa-plus"></i> إضافة خطة</button></div></div>
                    <div style="text-align:center; padding:4rem;"><i class="fas fa-folder-open" style="font-size:4rem; color:#aaa;"></i><p style="margin-top:1rem;">لا توجد خطط حالياً. أضف خطة جديدة!</p></div>
                    <div class="footer-quote">💡 أضف خطة لتبدأ</div>
                    <div class="developer-credit" onclick="window.open('https://wa.me/17862927607', '_blank');"><i class="fab fa-whatsapp"></i> المطور: حسام الحسين</div>
                `;
                document.getElementById('addPlanBtnTeacher').onclick = openAddPlanWizard;
                return;
            }

            // بناء واجهة المشرف
            document.getElementById('appContainer').innerHTML = `
                <div class="hero-area">
                    <div class="logo-title"><h1><i class="fas fa-chalkboard-user"></i> لوحة المشرف - <span id="planNameDisplayTeacher">${currentPlan?.name || ''}</span></h1></div>
                    <div class="admin-buttons">
                        <div id="planGridTeacher" class="plan-grid-teacher"></div>
                        <button id="studentsListBtn" class="btn-icon"><i class="fas fa-users"></i> الطلاب</button>
                        <button id="editScheduleBtnTeacher" class="btn-icon"><i class="fas fa-edit"></i> تعديل</button>
                        <button id="addPlanBtnTeacher" class="btn-icon" style="background:#4caf50; color:white;"><i class="fas fa-plus"></i> إضافة خطة</button>
                    </div>
                </div>
                <div class="info-note"><i class="fas fa-info-circle"></i> 👨‍🏫 يمكنك متابعة تقدم الطلاب وإدارة الخطط الدراسية.</div>
                <div class="today-highlight" id="todaySpotlight"><div style="font-weight:800;"><i class="fas fa-calendar-day"></i> مهام اليوم</div><div id="todayTasksList"></div></div>
                <div id="allDaysContainer"></div>
                <div class="motivational-board">📊 إدارة فعّالة لتحقيق أفضل النتائج</div>
                <div class="footer-quote">💪 القيادة الجيدة تبدأ بالتخطيط الجيد</div>
                <div class="developer-credit" onclick="window.open('https://wa.me/17862927607', '_blank');"><i class="fab fa-whatsapp"></i> المطور: حسام الحسين</div>
            `;
            renderPlanSelectors();
            await renderTeacherView();
            document.getElementById('editScheduleBtnTeacher').addEventListener('click', openEditSchedule);
            document.getElementById('studentsListBtn').addEventListener('click', showAllStudentsDialog);
            document.getElementById('addPlanBtnTeacher').addEventListener('click', openAddPlanWizard);

        } else {
            // وضع الطالب
            const storedId = safeLocalStorageGet('studentId');
            if (storedId) {
                await loadStudentData(storedId);
                if (currentStudent) {
                    // اختيار أول خطة افتراضية
                    const planIds = Object.keys(allPlans);
                    if (planIds.length > 0 && !currentPlanId) {
                        await loadPlan(planIds[0]);
                    } else if (planIds.length === 0) {
                        document.getElementById('appContainer').innerHTML = `<div style="text-align:center; padding:3rem;"><i class="fas fa-exclamation-circle" style="font-size:4rem; color:#f5b042;"></i><p>لا توجد خطط دراسية متاحة حالياً. يرجى مراجعة المشرف.</p></div>`;
                        return;
                    }
                    buildStudentUI();
                    renderStudentView();
                    return;
                }
            }

            // شاشة تسجيل الدخول
            const overlay = document.createElement('div'); overlay.className='student-login-overlay';
            overlay.innerHTML = `<div class="student-login-card"><i class="fas fa-user-graduate"></i><h2>مرحباً! سجل دخولك</h2><input type="text" id="studentFullName" placeholder="الاسم الثلاثي"><div style="margin:10px 0;"><label>الجنس:</label><div class="gender-select"><div class="gender-option" data-gender="ذكر">🧑 ذكر</div><div class="gender-option" data-gender="أنثى">👩 أنثى</div></div><input type="hidden" id="studentGender" value="ذكر"></div><div class="error-message" id="nameError">يرجى إدخال الاسم الثلاثي</div><button id="submitStudentData">دخول</button></div>`;
            document.body.appendChild(overlay);
            const genderOptions = overlay.querySelectorAll('.gender-option');
            const genderInput = document.getElementById('studentGender');
            genderOptions.forEach(opt => {
                opt.addEventListener('click', (e) => {
                    genderOptions.forEach(o=>o.classList.remove('selected'));
                    opt.classList.add('selected');
                    genderInput.value = opt.getAttribute('data-gender');
                    createParticlesOnGender(e, opt);
                });
            });
            genderOptions[0].classList.add('selected');
            document.getElementById('submitStudentData').addEventListener('click', async () => {
                const btn = document.getElementById('submitStudentData');
                if(btn.disabled) return;
                btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-pulse"></i> جاري...';
                const name = document.getElementById('studentFullName').value.trim();
                const gender = document.getElementById('studentGender').value;
                if(name.split(/\s+/).length<2) { showToast('الرجاء إدخال الاسم الثلاثي كاملاً', true); btn.disabled=false; btn.innerHTML='دخول'; return; }
                try {
                    await registerStudent(name, gender);
                    overlay.remove();
                    const planIds = Object.keys(allPlans);
                    if (planIds.length > 0) await loadPlan(planIds[0]);
                    buildStudentUI();
                    renderStudentView();
                } catch(error) { showToast('حدث خطأ في التسجيل', true); btn.disabled=false; btn.innerHTML='دخول'; }
            });
        }
    }

    function createParticlesOnGender(e, element) {
        const rect = element.getBoundingClientRect();
        const centerX = rect.left+rect.width/2; const centerY = rect.top+rect.height/2;
        for(let i=0;i<12;i++) {
            const angle = Math.random()*Math.PI*2;
            const distance = 30+Math.random()*50;
            const dx = Math.cos(angle)*distance; const dy = Math.sin(angle)*distance;
            const particle = document.createElement('div'); particle.className='particle-burst';
            particle.style.left = `${centerX-4}px`; particle.style.top = `${centerY-4}px`;
            particle.style.setProperty('--dx', `${dx}px`); particle.style.setProperty('--dy', `${dy}px`);
            particle.style.background = ['#ffb74d','#ff8a65','#81c784','#4fc3f7','#ff80ab'][Math.floor(Math.random()*5)];
            document.body.appendChild(particle);
            setTimeout(()=>particle.remove(),600);
        }
    }

    // بدء التشغيل
    initApp();
    document.body.addEventListener('click', function once() { initAudio(); document.body.removeEventListener('click', once); }, { once: true });
</script>
</body>
