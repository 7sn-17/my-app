    // ==========  الدوال المساعدة ==========
    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])); }
    function extractDuration(text) { let m = text.match(/\{(\d+(?:\.\d+)?)\}/); return m ? parseFloat(m[1]) : null; }
    function cleanTaskText(raw) { return raw.replace(/\s*\{[\d\.]+\}\s*$/, '').trim(); }
    function splitSub(text) { if (!text) return []; return text.split(/\n/).map(s=>s.trim()).filter(s=>s); }
    function formatTimeAndDate(ts) { if (!ts) return '—'; const d = new Date(ts); let h=d.getHours(); const m=d.getMinutes().toString().padStart(2,'0'); const ap=h>=12?'م':'ص'; h=h%12||12; return `${h}:${m} ${ap} - ${d.getDate()}/${d.getMonth()+1}`; }

    function safeLocalStorageSet(k,v) { try { localStorage.setItem(k,v); return true; } catch(e) { return false; } }
    function safeLocalStorageGet(k) { try { return localStorage.getItem(k); } catch(e) { return null; } }
    async function safeFirebaseGet(docRef, timeout=5000) {
        const p1 = docRef.get();
        const p2 = new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')), timeout));
        return await Promise.race([p1,p2]);
    }

    // ==========  تحميل المواد من Firebase ==========
    async function loadSubjectsFromFirebase() {
        const snapshot = await db.collection('subjects').get();
        allSubjects = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        // إذا لم توجد مواد، نقوم بترحيل البيانات القديمة
        if (allSubjects.length === 0) {
            await migrateOldData();
            return await loadSubjectsFromFirebase();
        }
        return allSubjects;
    }

    // ==========  بناء المهام من المادة الحالية ==========
    function rebuildSubtaskIds() {
        allSubTasks = [];
        if (!currentSubject) return;
        const days = currentSubject.days || [];
        let idCounter = 0;
        const durationType = currentSubject.durationType || 'count';
        days.forEach((day, dayIdx) => {
            const morningTasks = splitSub(day.morning);
            morningTasks.forEach(text => {
                let duration = 1;
                if (durationType === 'hours') {
                    const d = extractDuration(text);
                    if (d !== null) duration = d;
                }
                allSubTasks.push({
                    id: `task_${idCounter++}`,
                    dayIndex: dayIdx,
                    period: 'صباحي',
                    text: text,
                    duration: duration
                });
            });
            const eveningTasks = splitSub(day.evening);
            eveningTasks.forEach(text => {
                let duration = 1;
                if (durationType === 'hours') {
                    const d = extractDuration(text);
                    if (d !== null) duration = d;
                }
                allSubTasks.push({
                    id: `task_${idCounter++}`,
                    dayIndex: dayIdx,
                    period: 'مسائي',
                    text: text,
                    duration: duration
                });
            });
        });
    }

    // ==========  إحصائيات المادة ==========
    function getTotalHoursOfPlan() {
        return allSubTasks.reduce((sum, t) => sum + (t.duration || 0), 0);
    }
    function getCompletedHoursForStudent(student) {
        const completed = student.completedTasks && student.completedTasks[currentSubject.id] ? student.completedTasks[currentSubject.id] : [];
        let total = 0;
        completed.forEach(entry => {
            const task = allSubTasks.find(t => t.id === entry.taskId);
            if (task && task.duration) total += task.duration;
        });
        return total;
    }
    function getCompletedCountForStudent(student) {
        const completed = student.completedTasks && student.completedTasks[currentSubject.id] ? student.completedTasks[currentSubject.id] : [];
        return completed.length;
    }
    function getStudentCompletedBySubject(student) {
        return student.completedTasks && student.completedTasks[currentSubject.id] ? student.completedTasks[currentSubject.id] : [];
    }

    async function registerStudent(fullName, gender) {
        const newId = db.collection('students').doc().id;
        const data = {
            fullName, gender,
            completedTasks: {},
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()

    async function loadStudentData(studentId) {
        const doc = await db.collection('students').doc(studentId).get();
        if (doc.exists) {
            currentStudent = { id: studentId, ...doc.data() };
            if (!currentStudent.completedTasks) currentStudent.completedTasks = {};
        } else {
            currentStudent = null;
        }
    }
    async function saveStudentProgress(completedArray) {
        const update = {
            [`completedTasks.${currentSubject.id}`]: completedArray,
            lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
        };
        await db.collection('students').doc(currentStudent.id).update(update);
        currentStudent.completedTasks[currentSubject.id] = completedArray;
    }
    async function loadAllStudents() {
        const snapshot = await db.collection('students').get();
        allStudents = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        for (let s of allStudents) if (!s.completedTasks) s.completedTasks = {};
    }
    async function removeTaskFromAllStudents(taskId) {
        const snapshot = await db.collection('students').get();
        const batch = db.batch();
        snapshot.docs.forEach(doc => {
            const data = doc.data();
            if (data.completedTasks && data.completedTasks[currentSubject.id]) {
                const arr = data.completedTasks[currentSubject.id];
                const newArr = arr.filter(entry => entry.taskId !== taskId);
                if (newArr.length !== arr.length) {
                    batch.update(doc.ref, { [`completedTasks.${currentSubject.id}`]: newArr });
                }
            }
        });
        await batch.commit();
    }

    function renderStudentView() {
        if (!currentStudent || !currentSubject) return;
        const completedArray = getStudentCompletedBySubject(currentStudent);
        const completedMap = new Map();
        completedArray.forEach(entry => { if (entry.taskId) completedMap.set(entry.taskId, entry.completedAt); });

        const totalTasks = allSubTasks.length;
        const completedCount = completedMap.size;
        document.getElementById('globalDone').innerText = completedCount;
        document.getElementById('globalTotal').innerText = totalTasks;
        document.getElementById('globalProgressFill').style.width = totalTasks===0 ? '0%' : `${(completedCount/totalTasks)*100}%`;

        // اليوم
        const todayContainer = document.getElementById('todayTasksList');
        todayContainer.innerHTML = '';
        let todayTasks = [];
        if (currentSubject.durationType === 'count') {
            // الفيزياء: نبحث عن اليوم الحالي حسب التاريخ
            const todayStr = `${new Date().getDate()}/${new Date().getMonth()+1}`;
            const dayIndex = currentSubject.days.findIndex(d => d.date === todayStr);
            if (dayIndex !== -1) {
                todayTasks = allSubTasks.filter(t => t.dayIndex === dayIndex);
            } else {
                // إذا لم نجد، نأخذ أول يوم غير مكتمل
                let found = false;
                for (let i=0; i<currentSubject.days.length; i++) {
                    const dayTasks = allSubTasks.filter(t => t.dayIndex === i);
                    if (dayTasks.some(t => !completedMap.has(t.id))) {
                        todayTasks = dayTasks;
                        found = true;
                        break;
                    }
                }
                if (!found && currentSubject.days.length>0) {
                    todayTasks = allSubTasks.filter(t => t.dayIndex === currentSubject.days.length-1);
                }
            }
        } else {
            // العلوم: أول يوم غير مكتمل
            let firstIncomplete = null;
            for (let i=0; i<currentSubject.days.length; i++) {
                const dayTasks = allSubTasks.filter(t => t.dayIndex === i);
                if (dayTasks.some(t => !completedMap.has(t.id))) {
                    firstIncomplete = i;
                    break;
                }
            }
            if (firstIncomplete === null && currentSubject.days.length>0) firstIncomplete = currentSubject.days.length-1;
            if (firstIncomplete !== null) todayTasks = allSubTasks.filter(t => t.dayIndex === firstIncomplete);

                    div.innerHTML = `<input type="checkbox" class="subtask-check" data-id="${task.id}" ${completedMap.has(task.id) ? 'checked' : ''}><span style="flex:1;">${escapeHtml(cleanTaskText(task.text))}</span>${durHtml}`;
                    mornDiv.appendChild(div);

            if (evening.length) {

                evening.forEach(task => {
                    const div = document.createElement('div');
                    div.className = `subtask-item ${completedMap.has(task.id) ? 'completed-subtask' : ''}`;
                    let durHtml = (currentSubject.durationType==='hours' && task.duration) ? `<div class="duration-badge"><i class="fas fa-clock"></i> ${task.duration} ساعة</div>` : '';

    function attachTaskCheckEvents() {
        document.querySelectorAll('.subtask-check').forEach(cb => {

        });

    async function handleTaskToggle(e) {
        const cb = e.target;
        const taskId = cb.getAttribute('data-id');
        if (!currentStudent) return;
        let completed = getStudentCompletedBySubject(currentStudent);
        if (cb.checked) {
            playSound('complete');
            completed.push({ taskId, completedAt: Date.now() });
        } else {
            completed = completed.filter(entry => entry.taskId !== taskId);
        }
        await saveStudentProgress(completed);
        renderStudentView();
        playBeep();
    }

            dayCard.innerHTML = `
                <div class="day-header"><div class="day-date">${headerText}</div></div>
                <div style="padding:0.5rem 1.5rem 1.2rem;" id="dayContent-${idx}"></div>
            `;
            daysContainer.appendChild(dayCard);
            const periodDiv = dayCard.querySelector(`#dayContent-${idx}`);
            const renderTasks = (tasks, periodName) => {
                if (tasks.length === 0) return;
                const block = document.createElement('div');
                block.innerHTML = `<div class="period-title"><i class="fas ${periodName==='صباحي' ? 'fa-sun' : 'fa-moon'}"></i> ${periodName}</div><div id="list-${idx}-${periodName}"></div>`;
                periodDiv.appendChild(block);
                const list = block.querySelector(`#list-${idx}-${periodName}`);
                tasks.forEach(task => {
                    const completedCount = allStudents.filter(s => {
                        const comp = s.completedTasks && s.completedTasks[currentSubject.id] ? s.completedTasks[currentSubject.id] : [];
                        return comp.some(e => e.taskId === task.id);
                    }).length;
                    const total = allStudents.length;
                    const frac = total===0 ? '0/0' : `${completedCount}/${total}`;
                    const div = document.createElement('div');
                    div.className = 'subtask-item';
                    div.innerHTML = `<span>${escapeHtml(cleanTaskText(task.text))}</span><button class="detail-btn" data-task-id="${task.id}"><span class="ltr-fraction">${frac}</span></button>`;
                    list.appendChild(div);
                });
            };
            renderTasks(morningTasks, 'صباحي');
            renderTasks(eveningTasks, 'مسائي');
        });

        // ربط أزرار التفاصيل
        document.querySelectorAll('.detail-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const taskId = btn.dataset.taskId;
                showTaskDetails(taskId);
            });
        });

        // إخفاء لوحة الإحصائيات في وضع المعلم
        const statsPanel = document.querySelector('.stats-panel');
        if (statsPanel) statsPanel.style.display = 'none';

        refreshSounds();
    }

    // ==========  تفاصيل المهمة (للمعلم) ==========
    async function showTaskDetails(taskId) {
        const task = allSubTasks.find(t => t.id === taskId);
        if (!task) return;
        await loadAllStudents();
        const completedStudents = allStudents.filter(s => {
            const comp = s.completedTasks && s.completedTasks[currentSubject.id] ? s.completedTasks[currentSubject.id] : [];
            return comp.some(e => e.taskId === taskId);
        }).map(s => {
            const comp = s.completedTasks[currentSubject.id];
            const entry = comp.find(e => e.taskId === taskId);
            return { student: s, completedAt: entry.completedAt };
        });

        let currentFilter = 'all';
        const modal = document.getElementById('taskStatsModal');
        document.getElementById('taskStatTitle').innerHTML = `<i class="fas fa-tasks"></i> ${cleanTaskText(task.text)}`;
        const filterAll = document.getElementById('filterAllModal');
        const filterMale = document.getElementById('filterMaleModal');
        const filterFemale = document.getElementById('filterFemaleModal');

        function updateStatsAndList() {
            let filtered = [...completedStudents];
            if (currentFilter === 'male') filtered = filtered.filter(item => item.student.gender === 'ذكر');
            if (currentFilter === 'female') filtered = filtered.filter(item => item.student.gender === 'أنثى');

            const total = allStudents.length;
            const totalDone = completedStudents.length;
            const maleTotal = allStudents.filter(s => s.gender === 'ذكر').length;
            const femaleTotal = allStudents.filter(s => s.gender === 'أنثى').length;
            const maleDone = completedStudents.filter(item => item.student.gender === 'ذكر').length;
            const femaleDone = completedStudents.filter(item => item.student.gender === 'أنثى').length;

            let statsDiv = document.getElementById('taskStatsInfo');
            if (!statsDiv) {
                const titleDiv = document.getElementById('taskStatTitle');
                statsDiv = document.createElement('div');
                statsDiv.id = 'taskStatsInfo';
                statsDiv.style.cssText = 'background:#f0f7f0;padding:12px;border-radius:1rem;margin:10px 0;';
                statsDiv.innerHTML = `
                    <div><strong>الكل:</strong> <span id="totalCount"></span> (<span id="totalPercent"></span>%)</div>
                    <div><strong>ذكور:</strong> <span id="maleCount"></span> (<span id="malePercent"></span>%)</div>
                    <div><strong>إناث:</strong> <span id="femaleCount"></span> (<span id="femalePercent"></span>%)</div>
                `;
                titleDiv.insertAdjacentElement('afterend', statsDiv);
            }
            document.getElementById('totalCount').innerHTML = `<span dir="ltr">${totalDone}/${total}</span>`;
            document.getElementById('totalPercent').innerText = total===0 ? '0' : ((totalDone/total)*100).toFixed(1);
            document.getElementById('maleCount').innerHTML = `<span dir="ltr">${maleDone}/${maleTotal}</span>`;
            document.getElementById('malePercent').innerText = maleTotal===0 ? '0' : ((maleDone/maleTotal)*100).toFixed(1);
            document.getElementById('femaleCount').innerHTML = `<span dir="ltr">${femaleDone}/${femaleTotal}</span>`;
            document.getElementById('femalePercent').innerText = femaleTotal===0 ? '0' : ((femaleDone/femaleTotal)*100).toFixed(1);

            const listDiv = document.getElementById('studentsCompletedListModal');
            listDiv.innerHTML = '';
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'student-item';
                div.innerHTML = `<span class="student-name" data-student-id="${item.student.id}"><i class="fas fa-user-graduate"></i> ${escapeHtml(item.student.fullName)}</span><span class="student-time">${formatTimeAndDate(item.completedAt)}</span>`;
                listDiv.appendChild(div);
            });
            if (filtered.length===0) listDiv.innerHTML = '<div class="student-item">لا توجد إنجازات</div>';
            document.querySelectorAll('#studentsCompletedListModal .student-name').forEach(el => {
                el.addEventListener('click', function() {
                    const sid = this.dataset.studentId;
                    showStudentTasks(sid);
                });
            });
        }

        filterAll.onclick = () => { currentFilter='all'; setActive('all'); updateStatsAndList(); };
        filterMale.onclick = () => { currentFilter='male'; setActive('male'); updateStatsAndList(); };
        filterFemale.onclick = () => { currentFilter='female'; setActive('female'); updateStatsAndList(); };
        function setActive(active) {
            filterAll.classList.remove('active');
            filterMale.classList.remove('active');
            filterFemale.classList.remove('active');
            if (active==='all') filterAll.classList.add('active');
            if (active==='male') filterMale.classList.add('active');
            if (active==='female') filterFemale.classList.add('active');
        }
        setActive('all');
        updateStatsAndList();
        modal.classList.add('active');
    }

    // ==========  عرض مهام الطالب (للمعلم) ==========
    async function showStudentTasks(studentId) {
        const student = allStudents.find(s => s.id === studentId);
        if (!student) return;
        const completedEntries = student.completedTasks && student.completedTasks[currentSubject.id] ? student.completedTasks[currentSubject.id] : [];
        const completedTasksList = [];
        for (const entry of completedEntries) {
            const task = allSubTasks.find(t => t.id === entry.taskId);
            if (!task) continue;
            const day = currentSubject.days[task.dayIndex];
            const dateStr = currentSubject.durationType==='count' ? (day ? day.date : '?') : (day ? `اليوم ${day.dayNumber}` : '?');
            completedTasksList.push({ text: task.text, completedAt: entry.completedAt, date: dateStr, duration: task.duration });
        }

        const totalHours = getTotalHoursOfPlan();
        const completedHours = getCompletedHoursForStudent(student);
        const percent = totalHours===0 ? 0 : ((completedHours/totalHours)*100).toFixed(1);
        const taskPercent = allSubTasks.length===0 ? 0 : ((completedEntries.length/allSubTasks.length)*100).toFixed(1);

        const titleEl = document.getElementById('studentTasksTitle');
        titleEl.innerHTML = `
            <div style="text-align:center;">
                <div style="font-size:1.2rem; margin-bottom:8px;"><i class="fas fa-user-graduate"></i> ${escapeHtml(student.fullName)}</div>
                <div style="display:flex; justify-content:center; gap:20px; flex-wrap:wrap; font-size:0.9rem;">
                    <span style="background:#e8f5e9; padding:4px 12px; border-radius:20px;"><i class="fas fa-tasks"></i> المهام: ${completedEntries.length}/${allSubTasks.length} (${taskPercent}%)</span>
                    <span style="background:#e3f2fd; padding:4px 12px; border-radius:20px;"><i class="fas fa-clock"></i> الساعات: ${completedHours.toFixed(1)}/${totalHours.toFixed(1)} (${percent}%)</span>
                </div>
            </div>
        `;
        const container = document.getElementById('studentTasksList');
        if (completedTasksList.length === 0) {
            container.innerHTML = '<div class="student-task-card">لم ينجز أي مهام بعد</div>';
        } else {
            container.innerHTML = completedTasksList.map(task => {
                const timeStr = formatTimeAndDate(task.completedAt);
                let durHtml = (currentSubject.durationType==='hours' && task.duration) ? `<span class="duration-badge" style="background:#2196f3;"><i class="fas fa-clock"></i> ${task.duration} ساعة</span>` : '';
                return `<div class="student-task-card"><i class="fas fa-check-circle student-task-icon"></i><div style="flex:1;"><div style="font-weight:bold;">${escapeHtml(cleanTaskText(task.text))}</div><div style="font-size:0.75rem; color:#4a6741;">${timeStr}</div></div>${durHtml}</div>`;
            }).join('');
        }
        document.getElementById('studentTasksModal').classList.add('active');
        document.getElementById('studentTasksModal').style.zIndex = '3001';
        playSound('select');
    }

        modal.classList.add('active');
    }

    // ==========  إدارة المواد (للمعلم) ==========

        const modal = document.createElement('div');
        modal.className = 'modal active';
        modal.style.zIndex = '4000';
        modal.innerHTML = `
            <div class="modal-content" style="max-width:900px;">
                <h3><i class="fas fa-cogs"></i> إدارة المواد</h3>
                <div id="manageSubjectsList" class="subject-list-admin" style="margin-bottom:1rem;"></div>

            </div>

                    if (confirm(`هل أنت متأكد من حذف المادة "${allSubjects.find(s=>s.id===id).name}"؟`)) {
                        await db.collection('subjects').doc(id).delete();

                                document.getElementById('appContainer').innerHTML = '<p style="text-align:center;padding:2rem;">لا توجد مواد، أضف مادة جديدة من لوحة الإدارة.</p>';
                            }
                        }
                    }
                });
            });

        // عرض نموذج الإضافة
        document.getElementById('addSubjectBtn').addEventListener('click', () => {
            const formDiv = document.getElementById('addSubjectForm');
            if (formDiv.style.display === 'block') {
                formDiv.style.display = 'none';
                return;

            formDiv.style.display = 'block';

                    <input type="text" id="newSubjectName" placeholder="مثل: الكيمياء">
                </div>
                <div class="subject-form-group">
                    <label>نوع الحساب</label>
                    <select id="newSubjectDurationType">
                        <option value="count">عدد المهام (كل مهمة = 1)</option>

                        <div class="subject-form-group">
                            <label>المحتوى المسائي</label>

                                el.querySelector('.remove-day-btn').dataset.index = newIdx;

                            showToast('لا يمكن حذف اليوم الوحيد', true);

                    showToast('يرجى إضافة أيام للمادة', true);
                    return;

                dayEntries.forEach(el => {

        });

        document.getElementById('closeManageSubjects').addEventListener('click', () => {
            modal.remove();
        });

        renderSubjectList();
    }

    // ==========  دوال الصوت ==========
    let audioContext = null;
    function initAudio() {
        if (!audioContext) {
            try { audioContext = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return false; }
        }
        if (audioContext && audioContext.state === 'suspended') audioContext.resume();
        return true;
    }
    function playSound(type) {
        try {
            if (!initAudio()) return;
            let freq=800, dur=0.12, vol=0.1;
            if (type==='click') { freq=880; dur=0.08; vol=0.08; }
            else if (type==='select') { freq=660; dur=0.2; vol=0.12; }
            else if (type==='complete') { freq=1200; dur=0.15; vol=0.1; }
            else if (type==='success') {
                const osc2 = audioContext.createOscillator();
                const gain2 = audioContext.createGain();
                osc2.connect(gain2); gain2.connect(audioContext.destination);
                osc2.frequency.value = 1100; gain2.gain.value = vol; osc2.type = 'sine';
                osc2.start(); gain2.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime+dur);
                osc2.stop(audioContext.currentTime+dur);
                return;
            }
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain); gain.connect(audioContext.destination);
            osc.frequency.value = freq; gain.gain.value = vol; osc.type = 'sine';
            osc.start(); gain.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime+dur);
            osc.stop(audioContext.currentTime+dur);
        } catch(e) {}
    }
    function playBeep() {
        try {
            if (!audioContext) { try { audioContext = new (AudioContext||webkitAudioContext)(); } catch(e) { return; } }
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain); gain.connect(audioContext.destination);
            osc.frequency.value = 880; gain.gain.value = 0.15; osc.type = 'sine';
            osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime+0.3);
            osc.stop(audioContext.currentTime+0.3);
            if (audioContext.state==='suspended') audioContext.resume();
        } catch(e) {}
    }
    function refreshSounds() {
        setTimeout(() => {
            document.querySelectorAll('button, .btn, .btn-icon, .detail-btn, .add-subtask-btn, .gender-option, .filter-btn, .subject-card-vertical').forEach(btn => {
                if (btn.hasSound) return;
                btn.hasSound = true;
                btn.addEventListener('click', (e) => { e.stopPropagation(); playSound('click'); });
            });
        }, 50);
    }

    // ==========  توست ==========
    function showToast(msg, isError=false) {
        const toast = document.getElementById('toast-physics');
        if (!toast) return;
        toast.textContent = msg;
        toast.classList.remove('show', 'error');
        if (isError) toast.classList.add('error');
        void toast.offsetWidth;
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => { toast.classList.remove('show'); }, 2400);
    }

    // ==========  الجسيمات ==========
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function createParticles() {
        particles = [];
        for (let i=0; i<70; i++) {
            particles.push({
                x: Math.random()*canvas.width,
                y: Math.random()*canvas.height,
                radius: Math.random()*4+2,
                speedX: (Math.random()-0.5)*0.5,
                speedY: (Math.random()-0.5)*0.3,
                color: `rgba(60,120,70,${Math.random()*0.3+0.1})`
            });
        }
    }
    function drawParticles() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        for (let p of particles) {
            ctx.beginPath();
            ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
            ctx.fillStyle = p.color;
            ctx.fill();
            p.x += p.speedX;
            p.y += p.speedY;
            if (p.x<0) p.x=canvas.width;
            if (p.x>canvas.width) p.x=0;
            if (p.y<0) p.y=canvas.height;
            if (p.y>canvas.height) p.y=0;
        }
        requestAnimationFrame(drawParticles);
    }
    resizeCanvas(); createParticles(); drawParticles();
    window.addEventListener('resize', ()=>{ resizeCanvas(); createParticles(); });

    // ==========  إضافة النوافذ المنبثقة الثابتة ==========
    function addModals() {
        const modalHTML = `
            <div id="taskStatsModal" class="modal"><div class="modal-content"><h3 id="taskStatTitle" style="color:#1f5437;"></h3><div class="filter-buttons"><button id="filterAllModal" class="filter-btn active">الكل</button><button id="filterMaleModal" class="filter-btn">ذكور</button><button id="filterFemaleModal" class="filter-btn">إناث</button></div><div id="studentsCompletedListModal"></div><button class="btn" id="closeStatsModal" style="margin-top:15px;">إغلاق</button></div></div>
            <div id="studentTasksModal" class="modal"><div class="modal-content"><h3 id="studentTasksTitle" style="color:#1f5437;"></h3><div id="studentTasksList" style="margin:15px 0;"></div><button class="btn" id="closeStudentTasksModal">إغلاق</button></div></div>
            <div id="allStudentsModal" class="modal"><div class="modal-content"><h3 style="color:#1f5437;">قائمة الطلاب</h3><div class="filter-buttons"><button id="filterAll" class="filter-btn active">الكل</button><button id="filterMale" class="filter-btn">ذكور</button><button id="filterFemale" class="filter-btn">إناث</button></div><div id="allStudentsList"></div><button class="btn" id="closeAllStudentsModal" style="margin-top:15px;">إغلاق</button></div></div>
            <div id="customMessageModal" class="modal"><div class="modal-content" style="text-align:center; max-width:350px;"><i class="fas fa-check-circle" style="font-size:3rem; color:#2c6e3c;"></i><p id="customMessageText" style="margin-top:10px;"></p></div></div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHTML);
        document.getElementById('closeStatsModal')?.addEventListener('click', () => document.getElementById('taskStatsModal').classList.remove('active'));
        document.getElementById('closeStudentTasksModal')?.addEventListener('click', () => document.getElementById('studentTasksModal').classList.remove('active'));
        document.getElementById('closeAllStudentsModal')?.addEventListener('click', () => document.getElementById('allStudentsModal').classList.remove('active'));
        // إغلاق النوافذ عند النقر على الخلفية
        document.querySelectorAll('.modal').forEach(m => {
            m.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                }
            });
        });
    }

    // ==========  تهيئة التطبيق ==========
    async function initApp() {
        // عرض شاشة تحميل
        document.getElementById('appContainer').innerHTML = `
            <div style="text-align:center; padding:3rem; background:#fff; border-radius:2rem; margin:2rem; box-shadow:0 10px 25px rgba(0,0,0,0.05);">
                <i class="fas fa-spinner fa-pulse" style="font-size:3rem; color:#2c6e3c;"></i>
                <p style="margin-top:1rem; font-weight:bold; color:#1f5437;">جاري تحميل المواد...</p>
                <p style="font-size:0.8rem; color:#888; margin-top:0.5rem;">يرجى الانتظار</p>
            </div>
        `;

        try {
            // تحميل المواد من Firebase (مع الترحيل التلقائي)
            await loadSubjectsFromFirebase();
        } catch(err) {
            console.error('خطأ في تحميل المواد:', err);
            document.getElementById('appContainer').innerHTML = `
                <div style="text-align:center; padding:2rem; background:white; border-radius:2rem; margin:2rem; border-right:5px solid #c0392b;">
                    <i class="fas fa-exclamation-triangle" style="font-size:4rem; color:#c0392b;"></i>
                    <h2 style="color:#c0392b;">خطأ في الاتصال</h2>
                    <p style="margin:1rem 0;">يرجى التحقق من اتصال الإنترنت وإعادة التحميل.</p>
                    <button onclick="location.reload()" class="btn">إعادة المحاولة</button>
                </div>
            `;
            return;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const isTeacherRequest = urlParams.get('teacher') === 'true';

        if (isTeacherRequest) {
            // وضع المعلم
            isTeacherMode = true;
            adminAuthenticated = true;
            // اختيار أول مادة افتراضياً
            if (allSubjects.length > 0) {
                currentSubject = allSubjects[0];
                rebuildSubtaskIds();
            } else {
                // لا توجد مواد، نعرض رسالة
                document.getElementById('appContainer').innerHTML = `
                    <div class="hero-area"><div class="logo-title"><h1>لوحة المعلم</h1></div></div>
                    <p style="text-align:center;padding:2rem;">لا توجد مواد حالياً. استخدم زر "إدارة المواد" لإضافة مادة جديدة.</p>
                    <button class="btn" id="addFirstSubjectBtn">إضافة مادة جديدة</button>
                    <div class="developer-credit" onclick="window.open('https://wa.me/17862927607', '_blank');"><i class="fab fa-whatsapp"></i> المطور: يوسف السيد</div>
                `;
                document.getElementById('addFirstSubjectBtn').addEventListener('click', openManageSubjects);
                return;
            }
            // بناء واجهة المعلم
            document.getElementById('appContainer').innerHTML = `
                <div class="hero-area">
                    <div class="logo-title"><h1><i class="fas fa-chalkboard-user"></i> لوحة المعلم - ${escapeHtml(currentSubject.name)}</h1></div>
                    <div class="admin-buttons">
                        <button id="studentsListBtn" class="btn-icon"><i class="fas fa-users"></i> الطلاب</button>
                        <button id="manageSubjectsBtn" class="btn-icon"><i class="fas fa-cogs"></i> إدارة المواد</button>
                    </div>
                </div>
                <div class="info-note"><i class="fas fa-info-circle"></i> يمكنك متابعة تقدم الطلاب وإدارة المواد من هنا.</div>
                <div class="today-highlight" id="todaySpotlight"><div style="font-weight:800;"><i class="fas fa-calendar-day"></i> إنجازات اليوم</div><div id="todayTasksList"></div></div>
                <div id="allDaysContainer"></div>
                <div class="motivational-board">إدارة التقدم الدراسي بكل سهولة</div>
                <div class="footer-quote">المعلم هو أساس النجاح</div>
                <div class="developer-credit" onclick="window.open('https://wa.me/17862927607', '_blank');"><i class="fab fa-whatsapp"></i> المطور: يوسف السيد</div>
            `;
            await renderTeacherView();
            document.getElementById('studentsListBtn').addEventListener('click', showAllStudentsDialog);
            document.getElementById('manageSubjectsBtn').addEventListener('click', openManageSubjects);
        } else {
            // وضع الطالب
            const storedId = safeLocalStorageGet('studentId');
            if (storedId) {
                await loadStudentData(storedId);
                if (currentStudent) {
                    // إذا كان هناك طالب مسجل، نعرض شاشة اختيار المادة
                    showSubjectSelectionScreen();
                    return;
                }
            }
            // عرض شاشة تسجيل الدخول
            const overlay = document.createElement('div');
            overlay.className = 'student-login-overlay';
            overlay.innerHTML = `
                <div class="student-login-card">
                    <i class="fas fa-user-graduate"></i>
                    <h2>مرحباً! سجل دخولك</h2>
                    <input type="text" id="studentFullName" placeholder="الاسم الثنائي">
                    <div style="margin:10px 0;">
                        <label>الجنس:</label>
                        <div class="gender-select">
                            <div class="gender-option" data-gender="ذكر">ذكر</div>
                            <div class="gender-option" data-gender="أنثى">أنثى</div>
                        </div>
                        <input type="hidden" id="studentGender" value="ذكر">
                    </div>
                    <div class="error-message" id="nameError">يرجى إدخال الاسم الثنائي</div>
                    <button id="submitStudentData">دخول</button>
                </div>
            `;
            document.body.appendChild(overlay);
            const genderOpts = overlay.querySelectorAll('.gender-option');
            const genderInput = document.getElementById('studentGender');
            genderOpts.forEach(opt => {
                opt.addEventListener('click', () => {
                    genderOpts.forEach(o => o.classList.remove('selected'));
                    opt.classList.add('selected');
                    genderInput.value = opt.dataset.gender;
                    createParticlesOnGender(opt);
                });
            });
            genderOpts[0].classList.add('selected');
            document.getElementById('submitStudentData').addEventListener('click', async () => {
                const btn = document.getElementById('submitStudentData');
                if (btn.disabled) return;
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري...';
                const name = document.getElementById('studentFullName').value.trim();
                const gender = document.getElementById('studentGender').value;
                if (name.split(/\s+/).length < 2) {
                    showToast('يرجى إدخال الاسم الثنائي', true);
                    btn.disabled = false;
                    btn.innerHTML = 'دخول';
                    return;
                }
                try {
                    await registerStudent(name, gender);
                    overlay.remove();
                    showSubjectSelectionScreen();
                } catch(err) {
                    showToast('حدث خطأ، حاول مرة أخرى', true);
                    btn.disabled = false;
                    btn.innerHTML = 'دخول';
                }
            });
        }
    }

    function createParticlesOnGender(el) {
        const rect = el.getBoundingClientRect();
        const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
        for (let i=0; i<12; i++) {
            const angle = Math.random()*Math.PI*2;
            const dist = 30+Math.random()*50;
            const dx = Math.cos(angle)*dist, dy = Math.sin(angle)*dist;
            const p = document.createElement('div');
            p.className = 'particle-burst';
            p.style.left = (cx-4)+'px'; p.style.top = (cy-4)+'px';
            p.style.setProperty('--dx', dx+'px'); p.style.setProperty('--dy', dy+'px');
            p.style.background = ['#ffb74d','#ff8a65','#81c784','#4fc3f7','#ff80ab'][Math.floor(Math.random()*5)];
            document.body.appendChild(p);
            setTimeout(()=>p.remove(), 600);
        }
    }

    // ==========  تشغيل التطبيق ==========
    addModals();
    initApp();

    // تفعيل الصوت عند أول نقرة
    document.body.addEventListener('click', function once() {
        initAudio();
        document.body.removeEventListener('click', once);
    }, { once: true });
</script>
